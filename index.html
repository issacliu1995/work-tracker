<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作事项追踪</title>
<style>
:root {
  --bg: #f0fdfa; --bg2: #f8fdfb; --bg3: #e6f9f5; --card: #ffffff;
  --border: #bdf2e5; --border2: #99f6e4;
  --primary: #0d9488; --primary2: #14b8a6; --cta: #f97316; --cta-hover: #ea580c;
  --text: #134e4a; --text2: #5b8c87; --text-bright: #0f3d38;
  --pri-high: #e5483d; --pri-mid: #f59e0b; --pri-low: #3b82f6;
  --green: #10b981; --red: #ef4444;
  --shadow: 0 1px 3px rgba(13,148,136,0.06), 0 1px 2px rgba(13,148,136,0.04);
  --shadow-md: 0 4px 12px rgba(13,148,136,0.08);
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 15px; line-height: 1.6; min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 10% 0%, rgba(13,148,136,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 100%, rgba(249,115,22,0.03) 0%, transparent 50%);
}
.container { max-width: 1140px; margin: 0 auto; padding: 24px 28px; }

.header {
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 24px 0 18px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
}
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: 0.5px; color: var(--text-bright); }
.header h1 span { color: var(--primary); }
.header .sub { font-size: 14px; color: var(--text2); margin-top: 4px; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 22px; box-shadow: var(--shadow);
}
.stat .l { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
.stat .v { font-size: 28px; font-weight: 700; color: var(--text-bright); }
.stat .s { font-size: 12px; color: var(--text2); margin-top: 2px; }

.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 24px; overflow: hidden; box-shadow: var(--shadow);
}
.card-hd {
  padding: 15px 22px; border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 600; letter-spacing: 0.3px;
  color: var(--text2); background: var(--bg3);
  display: flex; justify-content: space-between; align-items: center;
}
.card-bd { padding: 20px 22px; }
.card-bd-empty { padding: 40px 20px; text-align: center; color: var(--text2); font-size: 14px; }

.add-form {
  display: grid; grid-template-columns: 130px 1fr 120px 100px 1fr 80px;
  gap: 10px; align-items: end; margin-bottom: 18px; padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.add-form input, .add-form select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text-bright);
  padding: 10px 12px; border-radius: 6px; font-size: 14px; font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.add-form input:focus, .add-form select:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
}
.add-form .btn-add {
  padding: 11px 18px; border-radius: 6px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; background: var(--cta); color: #fff;
  white-space: nowrap; font-family: inherit; transition: all 0.15s;
}
.add-form .btn-add:hover { background: var(--cta-hover); }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left; padding: 10px 10px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text2); border-bottom: 2px solid var(--border2); white-space: nowrap;
}
td { padding: 13px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:hover td { background: rgba(13,148,136,0.03); }
.empty-row td { padding: 40px; text-align: center; color: var(--text2); }

.pri-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; }
.pri-high { background: rgba(239,68,68,0.1); color: var(--pri-high); }
.pri-mid { background: rgba(245,158,11,0.1); color: var(--pri-mid); }
.pri-low { background: rgba(59,130,246,0.1); color: var(--pri-low); }

input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

input[type="number"].progress-inp {
  width: 52px; font-size: 13px; background: var(--bg); border: 1px solid var(--border);
  color: var(--text-bright); padding: 5px 6px; border-radius: 5px; text-align: center;
}
input[type="number"].progress-inp:focus { outline: none; border-color: var(--primary); }

.btn-sm {
  padding: 5px 14px; font-size: 12px; cursor: pointer; border-radius: 5px;
  border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: inherit;
  transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.04); }

.desc-cell { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: var(--text2); }
.desc-cell:hover { white-space: normal; overflow: visible; cursor: default; }

.footer { text-align: center; padding: 24px 0; color: var(--text2); font-size: 12px; }

@media(max-width: 900px) {
  .add-form { grid-template-columns: 1fr 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<!-- Password Gate -->
<div id="pwGate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:9999;display:flex;justify-content:center;align-items:center;flex-direction:column;">
  <div style="text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🔒</div>
    <h2 style="color:var(--text-bright);font-family:Georgia,serif;font-size:22px;margin-bottom:8px;">WORK TRACKER</h2>
    <p style="color:var(--text2);font-size:14px;margin-bottom:24px;">请输入访问密码</p>
    <input type="password" id="pwInput" placeholder="密码" style="background:var(--bg2);border:1px solid var(--border);color:var(--text-bright);padding:12px 18px;border-radius:6px;font-size:16px;width:240px;text-align:center;font-family:inherit;" onkeydown="if(event.key==='Enter')checkPw()">
    <br><br>
    <button class="btn-add" onclick="checkPw()" style="padding:10px 40px;font-size:15px;">进入</button>
    <p id="pwError" style="color:var(--red);font-size:12px;margin-top:12px;display:none;">密码错误</p>
  </div>
</div>

<div class="container" id="mainApp" style="display:none;">

<div class="header">
  <div>
    <h1>WORK <span>TRACKER</span></h1>
    <div class="sub">每周工作事项追踪 · 数据存于本地浏览器</div>
  </div>
</div>

<div class="stats-row" id="statsBar"></div>

<div class="card">
  <div class="card-hd">+ 新增工作事项</div>
  <div class="card-bd">
    <div class="add-form">
      <input type="date" id="addDate" style="font-size:13px;">
      <input type="text" id="addTask" placeholder="工作事项" required>
      <input type="text" id="addPartner" placeholder="合作人">
      <select id="addPriority">
        <option value="high">高优先级</option>
        <option value="mid" selected>中优先级</option>
        <option value="low">低优先级</option>
      </select>
      <input type="text" id="addDesc" placeholder="描述（可选）">
      <button class="btn-add" onclick="addTask()">+ 添加</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-hd">
    <span>📋 待办事项</span>
    <span style="font-size:13px;font-weight:400;" id="todoCount">0 项</span>
  </div>
  <div class="card-bd" id="todoBody"></div>
</div>

<div class="card">
  <div class="card-hd">
    <span>✅ 已完成事项</span>
    <button class="btn-sm" onclick="clearCompleted()" style="border-color:transparent;">清空记录</button>
  </div>
  <div class="card-bd" id="doneBody"></div>
</div>

<div class="footer">数据存储在浏览器本地 · 定期备份</div>
</div>

<script>
const PW_HASH = '053c636a43b8aa6f8f3c9566a298e71372733704e3e3e5871008bc24414a1450';
function checkPw() {
  const v = document.getElementById('pwInput').value;
  if (!v) return;
  if (sha256(v) === PW_HASH) {
    document.getElementById('pwGate').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    sessionStorage.setItem('wt_pw', '1');
  } else { document.getElementById('pwError').style.display = 'block'; }
}
function sha256(m){function R(n,c){return(n>>>c)|(n<<(32-c));}function B(n,c){return n>>>c;}function F(n,c,d){return(n&c)|(~n&d);}function G(n,c,d){return(n&c)|(n&d)|(c&d);}function H(n){return R(n,2)^R(n,13)^R(n,22);}function I(n){return R(n,6)^R(n,11)^R(n,25);}function J(n){return R(n,7)^R(n,18)^B(n,3);}function K(n){return R(n,17)^R(n,19)^B(n,10);}var k=[1116352408,1899447441,3049323471,3921009573,961987163,1508970993,2453635748,2870763221,3624381080,310598401,607225278,1426881987,1925078388,2162078206,2614888103,3248222580,3835390401,4022224774,264347078,604807628,770255983,1249150122,1555081692,1996064986,2554220882,2821834349,2952996808,3210313671,3336571891,3584528711,113926993,338241895,666307205,773529912,1294757372,1396182291,1695183700,1986661051,2177026350,2456956037,2730485921,2820302411,3259730800,3345764771,3516065817,3600352804,4094571909,275423344,430227734,506948616,659060556,883997877,958139571,1322822218,1537002063,1747873779,1955562222,2024104815,2227730452,2361852424,2428436474,2756734187,3204031479,3329325298];var h=[1779033703,3144134277,1013904242,2773480762,1359893119,2600822924,528734635,1541459225];var w=new Uint8Array(new TextEncoder().encode(m));var l=w.length;var b=l*8;var t=[];for(var i=0;i<l;i++)t[i>>2]|=w[i]<<(24-(i%4)*8);t[l>>2]|=0x80<<(24-(l%4)*8);t[((l+8>>6)+1)*16-1]=b;var T=t.length;for(var o=0;o<T;o+=16){var W=h.slice();for(var i=0;i<64;i++){var s=i<16?t[o+i]:(K(t[o+i-2])+t[o+i-7]+J(t[o+i-15])+t[o+i-16])|0;if(i>=16)t[o+i]=s;var S=(I(W[4])+G(W[4],W[5],W[6]))|0;var ch=(W[7]+S+k[i]+s)|0;var t1=(H(W[0])+F(W[0],W[1],W[2]))|0;W=[(ch+t1)|0,W[0],W[1],W[2],(W[3]+ch)|0,W[4],W[5],W[6]];h[0]=(h[0]+W[0])|0;h[1]=(h[1]+W[1])|0;h[2]=(h[2]+W[2])|0;h[3]=(h[3]+W[3])|0;h[4]=(h[4]+W[4])|0;h[5]=(h[5]+W[5])|0;h[6]=(h[6]+W[6])|0;h[7]=(h[7]+W[7])|0;}}return h.map(function(v){return('0000000'+(v>>>0).toString(16)).slice(-8);}).join('');}
(function(){if(sessionStorage.getItem('wt_pw')==='1'){document.getElementById('pwGate').style.display='none';document.getElementById('mainApp').style.display='block';}})();

function defState() {
  return { tasks: [], nextId: 1 };
}
function load() {
  const raw = localStorage.getItem('work_tracker_v2');
  if (raw) return JSON.parse(raw);
  return defState();
}
function save(s) { localStorage.setItem('work_tracker_v2', JSON.stringify(s)); }

let state = load();

function addTask() {
  const taskEl = document.getElementById('addTask');
  const taskName = taskEl.value.trim();
  if (!taskName) { taskEl.focus(); return; }

  const task = {
    id: state.nextId++,
    date: document.getElementById('addDate').value || new Date().toISOString().slice(0, 10),
    task: taskName,
    partner: document.getElementById('addPartner').value.trim() || '—',
    priority: document.getElementById('addPriority').value,
    progress: 0,
    desc: document.getElementById('addDesc').value.trim() || '—',
    done: false,
    doneDate: null,
    createdAt: new Date().toISOString(),
  };

  state.tasks.push(task);
  save(state);
  document.getElementById('addTask').value = '';
  document.getElementById('addPartner').value = '';
  document.getElementById('addDesc').value = '';
  renderAll();
}

function toggleDone(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  task.doneDate = task.done ? new Date().toISOString().slice(0, 10) : null;
  task.progress = task.done ? 100 : task.progress;
  save(state);
  renderAll();
}

function updateProgress(id, val) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  task.progress = Math.min(100, Math.max(0, parseInt(val) || 0));
  save(state);
  renderAll();
}

function deleteTask(id) {
  if (!confirm('确定删除此项吗？')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  save(state);
  renderAll();
}

function clearCompleted() {
  if (!confirm('确定清除所有已完成记录吗？')) return;
  state.tasks = state.tasks.filter(t => !t.done);
  save(state);
  renderAll();
}

function editTaskField(id, field, value) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  if (field === 'progress') {
    task.progress = Math.min(100, Math.max(0, parseInt(value) || 0));
  } else {
    task[field] = value;
  }
  save(state);
  // Don't full re-render to avoid losing input focus
  updateStats();
}

function undoComplete(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = false;
  task.doneDate = null;
  task.progress = Math.min(99, task.progress);
  save(state);
  renderAll();
}

function updateStats() {
  const todoTasks = state.tasks.filter(t => !t.done);
  const doneTasks = state.tasks.filter(t => t.done);
  const total = state.tasks.length;
  const highCount = todoTasks.filter(t => t.priority === 'high').length;
  document.getElementById('statsBar').innerHTML =
    '<div class="stat"><div class="l">待办事项</div><div class="v">' + todoTasks.length + '</div><div class="s">其中高优先 ' + highCount + ' 项</div></div>' +
    '<div class="stat"><div class="l">已完成</div><div class="v" style="color:var(--green);">' + doneTasks.length + '</div><div class="s">共 ' + total + ' 项任务</div></div>' +
    '<div class="stat"><div class="l">完成率</div><div class="v">' + (total > 0 ? Math.round(doneTasks.length / total * 100) : 0) + '%</div><div class="s">整体进展</div></div>' +
    '<div class="stat"><div class="l">本周新增</div><div class="v">' + state.tasks.filter(t => t.createdAt.slice(0,10) >= new Date(Date.now()-7*86400000).toISOString().slice(0,10)).length + '</div><div class="s">近7天</div></div>';
  document.getElementById('todoCount').textContent = todoTasks.length + ' 项';
}

function renderAll() {
  const todoTasks = state.tasks.filter(t => !t.done);
  const doneTasks = state.tasks.filter(t => t.done);
  updateStats();

  let todoHTML = '<table><thead><tr>' +
    '<th>布置日期</th><th>工作事项</th><th>合作人</th><th>优先级</th>' +
    '<th>进度</th><th>描述</th><th style="width:30px;">✓</th><th style="width:30px;"></th>' +
    '</tr></thead><tbody>';

  if (todoTasks.length === 0) {
    todoHTML += '<tr class="empty-row"><td colspan="8">暂无待办事项，上方添加新任务</td></tr>';
  } else {
    todoTasks.sort((a, b) => {
      const po = { high:0, mid:1, low:2 };
      if (po[a.priority] !== po[b.priority]) return po[a.priority] - po[b.priority];
      return a.date.localeCompare(b.date);
    });
    todoTasks.forEach(t => {
      todoHTML += '<tr>' +
        '<td><input type="date" value="' + t.date + '" onchange="editTaskField(' + t.id + ',\'date\',this.value)" style="font-size:12px;background:transparent;border:1px solid transparent;color:var(--text);padding:4px 6px;border-radius:4px;width:120px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'"></td>' +
        '<td><input type="text" value="' + t.task.replace(/"/g,'&quot;') + '" onchange="editTaskField(' + t.id + ',\'task\',this.value)" style="font-weight:600;font-size:14px;background:transparent;border:1px solid transparent;color:var(--text-bright);padding:4px 6px;border-radius:4px;min-width:160px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'"></td>' +
        '<td><input type="text" value="' + t.partner.replace(/"/g,'&quot;') + '" onchange="editTaskField(' + t.id + ',\'partner\',this.value)" style="font-size:13px;background:transparent;border:1px solid transparent;color:var(--text);padding:4px 6px;border-radius:4px;width:80px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'"></td>' +
        '<td><select onchange="editTaskField(' + t.id + ',\'priority\',this.value);renderAll()" style="font-size:12px;background:transparent;border:1px solid transparent;color:var(--text);padding:4px;border-radius:4px;cursor:pointer;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'">' +
          '<option value="high"' + (t.priority==='high'?' selected':'') + '>高</option>' +
          '<option value="mid"' + (t.priority==='mid'?' selected':'') + '>中</option>' +
          '<option value="low"' + (t.priority==='low'?' selected':'') + '>低</option>' +
        '</select></td>' +
        '<td style="white-space:nowrap;"><input type="number" class="progress-inp" value="' + t.progress + '" min="0" max="100" onchange="editTaskField(' + t.id + ',\'progress\',this.value)"> %</td>' +
        '<td><input type="text" value="' + t.desc.replace(/"/g,'&quot;') + '" onchange="editTaskField(' + t.id + ',\'desc\',this.value)" style="font-size:12px;background:transparent;border:1px solid transparent;color:var(--text2);padding:4px 6px;border-radius:4px;min-width:120px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'" placeholder="描述..."></td>' +
        '<td><input type="checkbox" onchange="toggleDone(' + t.id + ')" title="标记完成"></td>' +
        '<td><button class="btn-sm" style="border-color:transparent;" onclick="deleteTask(' + t.id + ')" title="删除">✕</button></td>' +
        '</tr>';
    });
  }
  todoHTML += '</tbody></table>';
  document.getElementById('todoBody').innerHTML = todoHTML;

  let doneHTML = '<table><thead><tr>' +
    '<th>布置日期</th><th>完成日期</th><th>工作事项</th><th>合作人</th><th>优先级</th><th>描述</th><th style="width:30px;"></th><th style="width:30px;"></th>' +
    '</tr></thead><tbody>';

  if (doneTasks.length === 0) {
    doneHTML += '<tr class="empty-row"><td colspan="8">暂无已完成事项</td></tr>';
  } else {
    doneTasks.sort((a, b) => (b.doneDate || '').localeCompare(a.doneDate || ''));
    doneTasks.forEach(t => {
      doneHTML += '<tr style="opacity:0.7;">' +
        '<td><input type="date" value="' + t.date + '" onchange="editTaskField(' + t.id + ',\'date\',this.value)" style="font-size:12px;background:transparent;border:1px solid transparent;color:var(--text);padding:4px 6px;border-radius:4px;width:120px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'"></td>' +
        '<td style="font-size:12px;color:var(--green);white-space:nowrap;">' + (t.doneDate || '—') + '</td>' +
        '<td><input type="text" value="' + t.task.replace(/"/g,'&quot;') + '" onchange="editTaskField(' + t.id + ',\'task\',this.value)" style="text-decoration:line-through;font-weight:600;font-size:14px;background:transparent;border:1px solid transparent;color:var(--text);padding:4px 6px;border-radius:4px;min-width:160px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'"></td>' +
        '<td><input type="text" value="' + t.partner.replace(/"/g,'&quot;') + '" onchange="editTaskField(' + t.id + ',\'partner\',this.value)" style="font-size:13px;background:transparent;border:1px solid transparent;color:var(--text);padding:4px 6px;border-radius:4px;width:80px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'"></td>' +
        '<td><select onchange="editTaskField(' + t.id + ',\'priority\',this.value);renderAll()" style="font-size:12px;background:transparent;border:1px solid transparent;color:var(--text);padding:4px;border-radius:4px;cursor:pointer;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'">' +
          '<option value="high"' + (t.priority==='high'?' selected':'') + '>高</option>' +
          '<option value="mid"' + (t.priority==='mid'?' selected':'') + '>中</option>' +
          '<option value="low"' + (t.priority==='low'?' selected':'') + '>低</option>' +
        '</select></td>' +
        '<td><input type="text" value="' + t.desc.replace(/"/g,'&quot;') + '" onchange="editTaskField(' + t.id + ',\'desc\',this.value)" style="font-size:12px;background:transparent;border:1px solid transparent;color:var(--text2);padding:4px 6px;border-radius:4px;min-width:120px;" onfocus="this.style.borderColor=\'var(--border)\'" onblur="this.style.borderColor=\'transparent\'" placeholder="描述..."></td>' +
        '<td><button class="btn-sm" onclick="undoComplete(' + t.id + ')" title="撤销到待办" style="border-color:var(--cta);color:var(--cta);">↩</button></td>' +
        '<td><button class="btn-sm" style="border-color:transparent;" onclick="deleteTask(' + t.id + ')" title="删除">✕</button></td>' +
        '</tr>';
    });
  }
  doneHTML += '</tbody></table>';
  document.getElementById('doneBody').innerHTML = doneHTML;
}

document.getElementById('addDate').value = new Date().toISOString().slice(0, 10);
window.addEventListener('load', () => renderAll());
</script>
</body>
</html>
